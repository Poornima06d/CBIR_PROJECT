<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>Results</title>
  <style>
    body { background: #f9fafb; font-family: Arial; text-align: center; }
    img { border-radius: 10px; margin: 10px; width: 200px; height: 200px; object-fit: cover; }
    .grid { display: flex; flex-wrap: wrap; justify-content: center; }
    button { background: #22c55e; border: none; color: white; padding: 5px 10px; border-radius: 5px; cursor: pointer; margin: 3px; }
    .feedback { margin-top: 5px; }
    .back-btn { background: #2563eb; color: white; padding: 10px 20px; border-radius: 8px; margin-top: 20px; cursor: pointer; border: none; }
    .download-btn { background: #f59e0b; color: white; padding: 10px 20px; border-radius: 8px; border: none; margin-top: 20px; cursor: pointer; }
  </style>
</head>
<body>
  <h2>🔍 Results for your uploaded image</h2>
  <img src="{{ url_for('static', filename='results/' + query) }}" width="250"><br>
  <h3>Top {{ results|length }} Most Similar Images</h3>

  <div class="grid">
    {% for img in results %}
      <div>
        <img src="{{ url_for('static', filename='results/' + img) }}" alt="{{ img }}">
        <div class="feedback">
          <button onclick="sendFeedback('{{ img }}', true)">👍 Relevant</button>
          <button onclick="sendFeedback('{{ img }}', false)">👎 Irrelevant</button>
        </div>
      </div>
    {% endfor %}
  </div>

  <button class="download-btn" onclick="downloadImages()">⬇️ Download All as ZIP</button>
  <br>
  <button class="back-btn" onclick="goBack()">🔁 Search Another Image</button>

  <script>
    const images = JSON.parse('{{ results | tojson | safe }}');

    function sendFeedback(image, feedback) {
      fetch('/feedback', {
        method: 'POST',
        headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify({ image: image, feedback: feedback })
      })
      .then(res => res.json())
      .then(data => alert(data.message))
      .catch(err => console.error('Feedback error:', err));
    }

    function goBack() {
      window.location.href = "/";
    }

    function downloadImages() {
      fetch('/download', {
        method: 'POST',
        headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify({ images: images })
      })
      .then(response => response.blob())
      .then(blob => {
        const url = window.URL.createObjectURL(blob);
        const a = document.createElement('a');
        a.href = url;
        a.download = 'similar_images.zip';
        document.body.appendChild(a);
        a.click();
        a.remove();
        window.URL.revokeObjectURL(url);
      });
    }
  </script>
</body>
</html>
